<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Available for Acquisition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">
                <span id="domain-name" class="text-blue-600 uppercase tracking-wide">This Domain</span> 
                <br>is available for acquisition
            </h1>
            <p class="text-gray-500 text-sm">Please submit your serious offer or inquiry using the secure form below.</p>
        </div>

        <form action="YOUR_ENDPOINT_URL" method="POST" class="space-y-5">
            
            <input type="text" name="_gotcha" style="display:none">

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Full Name / Organization</label>
                <input type="text" id="name" name="name" required 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" name="email" required 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label for="offer" class="block text-sm font-medium text-gray-700">Offer Amount (USD)</label>
                <input type="number" id="offer" name="offer" min="500" placeholder="e.g. 5000" required 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label for="message" class="block text-sm font-medium text-gray-700">Message (Optional)</label>
                <textarea id="message" name="message" rows="3" 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                Submit Secure Offer
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            All offers are legally binding. Transactions are processed via secure escrow.
        </div>
    </div>

    <script>
        // Automatically display the domain name being visited
        const hostname = window.location.hostname.replace('www.', '');
        if(hostname && hostname !== 'localhost' && hostname !== '127.0.0.1') {
            document.getElementById('domain-name').textContent = hostname;
        }
    </script>
</body>
</html>
